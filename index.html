<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CSS Maker</title>
        <link rel="stylesheet" href="./styles/index.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Poppins:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">
                <i data-lucide="layout"></i>
                <span>CSSGen</span>
            </div>
            <div class="nav-links">
                <a
                    href="https://github.com/codeid9"
                    class="icon-btn"
                    target="_blank"
                >
                    <i data-lucide="code"></i>
                </a>
                <button id="theme-toggle" class="icon-btn">
                    <i data-lucide="sun"></i>
                </button>
            </div>
        </nav>
        <!-- main section -->
        <main class="app-container">
            <!-- sidebar section -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <button class="sidebar-toggle">
                        <i data-lucide="panel-left-close" class="icon-btn"></i>
                    </button>
                </div>
                <hr />
                <div id="tools-tab">
                    <button
                        class="tab-btn active"
                        title="Box Shadow"
                        data-tool="box-shadow"
                    >
                        <i class="icon-btn" data-lucide="layers"></i>
                    </button>
                    <button
                        class="tab-btn"
                        title="Text Shadow"
                        data-tool="text-shadow"
                    >
                        <i class="icon-btn" data-lucide="type"></i>
                    </button>
                    <button
                        class="tab-btn"
                        title="Border Radius"
                        data-tool="border-radius"
                    >
                        <i class="icon-btn" data-lucide="square"></i>
                    </button>
                </div>
                <hr />
                <div id="controls-tab">
                    <h3 id="tool-title">Box Shadow</h3>
                    <div id="box-shadow-controls" class="tool-settings active">
                        <div class="input-group">
                            <label>Shift Shadow (X)</label>
                            <input type="range" min="-50" max="50" value="10" id="bs-x" />
                        </div>
                        <div class="input-group">
                            <label>Shift Shadow (Y)</label>
                            <input type="range" min="-50" max="50" value="10" id="bs-y" />
                        </div>
                        <div class="input-group">
                            <label>Shadow Spreadness</label>
                            <input type="range" min="-50" max="50" value="2" id="bs-spread" />
                        </div>
                        <div class="input-group">
                            <label>Blur</label>
                            <input type="range" min="0" max="100" value="20" id="bs-blur" />
                        </div>
                        <div class="input-group">
                            <label>Shadow Opacity</label>
                            <input type="range" step="0.01" min="0" max="1" value="0.5" id="bs-opacity" />
                        </div>
                        <div class="input-group">
                            <label>Shadow Color</label>
                            <input type="color" id="bs-color"/>
                        </div>
                    </div>
                    <div id="text-shadow-controls" class="tool-settings">
                        <p>pending</p>
                    </div>
                    <div id="border-radius-controls" class="tool-settings">
                        <p>pending</p>
                    </div>
                </div>
            </aside>
            <!-- preview or code area -->
            <section class="preview-area">
                <div id="target-box">Preview Box</div>
            </section>
        </main>
        <!-- footer section -->
        <footer>
            <p>Made with ❤️ by Codeid9</p>
        </footer>
        <!-- scripts -->
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="./scripts/main.js"></script>
    </body>
</html>
